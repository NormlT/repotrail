services:
  repotrail:
    build: .
    container_name: repotrail
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8055}:8055"
    volumes:
      - repotrail_data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/repotrail.db

volumes:
  repotrail_data:
